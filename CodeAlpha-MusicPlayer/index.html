<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Music Player</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="app-container">

    <!-- Playlist (100% width on left) -->
    <div class="playlist">
        <h2>Playlist</h2>
        <ul id="song-list"></ul>
    </div>

    <!-- Center Music Player -->
    <div class="player-container">

        <div class="player">
<button id="theme-toggle" class="theme-btn"><i class="fa-solid fa-moon"></i></button>

            <h2 id="song-title">Song Title</h2>
            <p id="song-artist">Artist Name</p>

            <audio id="audio"></audio>

            <!-- Controls -->
            <div class="controls">
                <button id="prev"><i class="fa-solid fa-backward"></i></button>
                <button id="play"><i class="fa-solid fa-play"></i></button>
                <button id="next"><i class="fa-solid fa-forward"></i></button>
            </div>

            <!-- Progress Bar -->
            <div class="progress-container">
                <span id="current-time">0:00</span>
                <input type="range" id="progress" value="0">
                <span id="duration">0:00</span>
            </div>

            <!-- Volume -->
            <div class="volume-container">
                <label><i class="fa-solid fa-volume-high"></i> Volume</label>
                <input type="range" id="volume" min="0" max="1" step="0.01">
            </div>

        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
